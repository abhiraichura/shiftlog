name = "ShiftLog"
client_id = "8ba94ef76ded91d1660bc1290d004839"
application_url = "https://shiftlog-production-2a26.up.railway.app"
embedded = true
handle = "shiftlog-team-operations-log"

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""

[access_scopes]
scopes = "read_orders,write_orders,read_products,write_products"

[auth]
redirect_urls = [
  "https://shiftlog-production-2a26.up.railway.app/auth/callback",
  "https://shiftlog-production-2a26.up.railway.app/auth/shopify/callback"
]

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri = "/webhooks/billing"

[pos]
embedded = false

[[extensions]]
type = "ui_extension"
name = "order-annotations"
handle = "shiftlog-order-annotations"

[[extensions]]
type = "ui_extension"
name = "customer-notes"
handle = "shiftlog-customer-notes"

[[extensions]]
type = "ui_extension"
name = "product-supplier"
handle = "shiftlog-product-supplier"
